<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

<body>
    <div id="app">
        <table id="theatreTable" class="table table-striped table-bordered">
    
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Rating</th>
            </tr>
      
     
            <tr v-for="theatre in theaters">
                <td @click="getTheatre(theatre.id)">{{ theatre.name }}</td>
                <td>{{ theatre.price }}</td>
                <td>{{ theatre.rating }}</td>
                <td>
                    <button type="button" class="btn btn-primary" @click="getTheatre(theatre.id)">Open Modal</button>
                </td>
            </tr>
           
        </table>
        <div id="theatreInModal" class="modal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <button type="button" class="close" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <table>
                            <tr>
                                <th>ID</th>
                                <td>{{ theatreInModal.id }}</td>
                            </tr>
                            <tr>
                                <th>Name</th>
                                <td>{{ theatreInModal.name }}</td>
                            </tr>
                            <tr>
                                <th>Price</th>
                                <td>{{ theatreInModal.price }}</td>
                            </tr>
                            <tr>
                                <th>Rating</th>
                                <td>{{ theatreInModal.rating }}</td>
                            </tr>
                        </table>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
